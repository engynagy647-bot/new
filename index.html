<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أهلاً بيك في التراكر الذكي</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
  
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
  
  body{
    background:url('https://images.unsplash.com/photo-1540420773420-3366772f4999?q=80&w=1920') no-repeat center fixed;
    background-size:cover;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    backdrop-filter:blur(3px);
    overflow:hidden;
  }
  
  .box{
    max-width:650px;
    background:rgba(255,255,255,0.97);
    border-radius:22px;
    padding:60px 50px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
    text-align:center;
    animation:fadeInUp 0.8s ease;
    border:2px solid #bbf7d0;
  }
  
  @keyframes fadeInUp{
    from{opacity:0;transform:translateY(30px)}
    to{opacity:1;transform:translateY(0)}
  }
  
  h1{
    color:#15803d;
    font-size:36px;
    margin-bottom:30px;
    font-weight:900;
  }
  
  p{
    color:#166534;
    font-size:20px;
    line-height:2.2;
    margin-bottom:45px;
    font-weight:500;
  }
  
  .btn{
    width:100%;
    background:linear-gradient(135deg,#22c55e,#15803d);
    color:#fff;
    border:none;
    padding:18px;
    border-radius:12px;
    font-weight:bold;
    font-size:22px;
    cursor:pointer;
    transition:all 0.3s ease;
    box-shadow:0 8px 25px rgba(34,197,94,0.4);
  }
  
  .btn:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 12px 35px rgba(34,197,94,0.6);
  }
  
  @media(max-width:600px){
    .box{padding:40px 25px}
    h1{font-size:28px}
    p{font-size:18px}
  }
</style>
</head>
<body>
  <div class="box">
    <h1>🥬 أهلاً بيك</h1>
    <p>
      دا ويب سايت بياخذ باله من اكلك ونظامك<br><br>
      تدخل اسم وزنك سنك وطولك وشويه بيانات تانيه<br><br>
      وهو هيساعدك فى تحديد كتله جسمك و نوع جسمك وجباتك
    </p>
    <button class="btn" onclick="goToForm()">يلا نبدأ الرحله 🚀</button>
  </div>

  <script>
    function goToForm(){
      // تأثير تقليب الصفحة
      document.body.style.transition = 'all 0.6s ease';
      document.body.style.opacity = '0';
      document.body.style.transform = 'scale(0.95)';
      
      setTimeout(() => {
        window.location.href = 'FORM.HTML';
      }, 600);
    }
  </script>
</body>
</html>
